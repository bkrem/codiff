name: build-app

on:
  push:
    paths:
      - '.github/workflows/build-app.yml'
      - 'bin/**'
      - 'electron/**'
      - 'forge.config.cjs'
      - 'index.html'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'src/**'
      - 'vite.config.*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        node-version: [26]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt update
          sudo apt install -y wine-stable p7zip-full rpm

          mkdir -p "${HOME}/.wine/drive_c/windows/system32"
          ln -sf $(which 7z) "${HOME}/.wine/drive_c/windows/system32/7z.exe"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        id: pnpm-install
        with:
          run_install: false

      - name: Install Node Dependencies
        run: pnpm install

      - name: Build Renderer
        run: pnpm exec vp build

      - name: Build Native Apps
        run: |
          rm -rf artifacts/native-apps
          mkdir -p artifacts/native-apps

          pnpm exec electron-forge make --platform=linux --arch=x64
          find out -maxdepth 5 -type f | sort
          cp -R out/make artifacts/native-apps/linux-make
          tar -czf artifacts/native-apps/codiff-linux-x64.tar.gz -C out codiff-linux-x64

          pnpm exec electron-forge make --platform=win32 --arch=x64
          find out -maxdepth 5 -type f | sort
          cp -R out/make artifacts/native-apps/windows-make

          find artifacts/native-apps -maxdepth 6 -type f | sort

      - name: Upload Artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: native-apps
          path: ./artifacts/native-apps
