packages:
  - core

allowBuilds:
  '@google/genai': false
  '@nkzw/mdx-editor': true
  '@swc/core': true
  electron: true
  electron-winstaller: true
  node-pty: true
  protobufjs: false
blockExoticSubdeps: false
minimumReleaseAgeExclude:
  - '@nkzw/*'
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@^0.2.4
  vite-plus: ^0.2.4
  vitest: 4.1.10
nodeLinker: hoisted
onlyBuiltDependencies:
  - '@nkzw/mdx-editor'
  - '@swc/core'
  - electron
  - electron-winstaller
  - unrs-resolver
overrides:
  extract-zip>yauzl: ^3.4.0
  vite: 'catalog:'
  vitest: 'catalog:'
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
